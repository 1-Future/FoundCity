<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoundCity Test Client</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'Monaco', monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
#top { padding: 12px; background: #16213e; border-bottom: 1px solid #333; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
#top label { font-size: 12px; color: #888; }
#top input { background: #0f3460; border: 1px solid #444; color: #e0e0e0; padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 13px; }
#top input#server-url { width: 220px; }
#top input#username { width: 120px; }
#top button { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: bold; }
#btn-connect { background: #27ae60; color: #fff; }
#btn-connect:hover { background: #2ecc71; }
#btn-connect.connected { background: #c0392b; }
#btn-connect.connected:hover { background: #e74c3c; }
#status { font-size: 12px; padding: 2px 8px; border-radius: 10px; }
.status-disconnected { background: #7f1d1d; color: #fca5a5; }
.status-connecting { background: #78350f; color: #fcd34d; }
.status-connected { background: #14532d; color: #86efac; }
#player-state { font-size: 11px; color: #888; margin-left: auto; }
#log { flex: 1; overflow-y: auto; padding: 8px 12px; font-size: 12px; line-height: 1.6; }
.log-entry { border-bottom: 1px solid #1a1a2e; padding: 2px 0; word-break: break-all; }
.log-sent { color: #60a5fa; }
.log-recv { color: #86efac; }
.log-system { color: #fbbf24; }
.log-error { color: #f87171; }
.log-info { color: #a78bfa; }
.msg-type { font-weight: bold; margin-right: 6px; }
.msg-time { color: #555; font-size: 10px; margin-right: 6px; }
#bottom { padding: 10px 12px; background: #16213e; border-top: 1px solid #333; display: flex; gap: 8px; }
#cmd-input { flex: 1; background: #0f3460; border: 1px solid #444; color: #e0e0e0; padding: 8px 12px; border-radius: 4px; font-family: inherit; font-size: 13px; }
#cmd-input:focus { outline: none; border-color: #60a5fa; }
#btn-send { padding: 8px 20px; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-family: inherit; font-weight: bold; }
#btn-send:hover { background: #3b82f6; }
#shortcuts { display: flex; gap: 4px; flex-wrap: wrap; padding: 4px 12px 8px; background: #16213e; }
#shortcuts button { padding: 3px 8px; background: #1e3a5f; border: 1px solid #333; color: #bbb; border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 11px; }
#shortcuts button:hover { background: #2563eb; color: #fff; }
</style>
</head>
<body>
<!-- Top: Connection controls -->
<div id="top">
  <label>Server:</label>
  <input type="text" id="server-url" value="ws://localhost:8888">
  <label>Username:</label>
  <input type="text" id="username" value="admin" maxlength="12">
  <button id="btn-connect" onclick="toggleConnect()">Connect</button>
  <span id="status" class="status-disconnected">Disconnected</span>
  <span id="player-state"></span>
</div>

<!-- Center: Message log -->
<div id="log"></div>

<!-- Bottom: Shortcuts + input -->
<div id="shortcuts">
  <button onclick="sendShortcut('::getcoord')">getcoord</button>
  <button onclick="sendShortcut('::tele 0,50,50,32,32')">tele lumby</button>
  <button onclick="sendShortcut('::tele 0,50,50,40,40')">tele +8,+8</button>
  <button onclick="sendShortcut('::give 995 1000')">give gp</button>
  <button onclick="sendShortcut('::setstat hitpoints 99')">99 hp</button>
  <button onclick="sendShortcut('::fly')">fly mode</button>
  <button onclick="clearLog()">clear log</button>
</div>
<div id="bottom">
  <input type="text" id="cmd-input" placeholder="Type command (::tele 0,50,50, move 3201 3200, say hello, or raw JSON)" onkeydown="if(event.key==='Enter')sendCmd()">
  <button id="btn-send" onclick="sendCmd()">Send</button>
</div>

<script>
let ws = null;
let pingTimer = null;
let playerState = { x: 0, z: 0, level: 0, pid: -1, staff: 0 };

function $(id) { return document.getElementById(id); }

function setStatus(text, cls) {
  const el = $('status');
  el.textContent = text;
  el.className = cls;
}

function updatePlayerState() {
  $('player-state').textContent = playerState.pid >= 0
    ? `pid=${playerState.pid} pos=(${playerState.x}, ${playerState.z}) lvl=${playerState.level} staff=${playerState.staff}`
    : '';
}

function logMsg(text, cls, msgType) {
  const log = $('log');
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + cls;
  const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  let typeSpan = msgType ? `<span class="msg-type">[${msgType}]</span>` : '';
  entry.innerHTML = `<span class="msg-time">${time}</span>${typeSpan}${escapeHtml(text)}`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function clearLog() { $('log').innerHTML = ''; }

function toggleConnect() {
  if (ws && ws.readyState <= 1) {
    ws.close();
  } else {
    connect();
  }
}

function connect() {
  const url = $('server-url').value;
  const username = $('username').value.trim();
  if (!username) { logMsg('Enter a username', 'log-error'); return; }

  setStatus('Connecting...', 'status-connecting');
  logMsg(`Connecting to ${url}...`, 'log-system');

  try { ws = new WebSocket(url); } catch(e) { logMsg('Invalid URL: ' + e.message, 'log-error'); return; }

  ws.onopen = () => {
    setStatus('Authenticating...', 'status-connecting');
    logMsg('Connected, sending auth...', 'log-system');
    sendRaw({ type: 'auth_login', username: username, password: '' });

    // keep-alive ping every 30s
    pingTimer = setInterval(() => {
      if (ws && ws.readyState === 1) sendRaw({ type: 'no_timeout' });
    }, 30000);

    $('btn-connect').textContent = 'Disconnect';
    $('btn-connect').classList.add('connected');
  };

  ws.onmessage = (ev) => {
    let data;
    try { data = JSON.parse(ev.data); } catch(e) { logMsg('Non-JSON: ' + ev.data, 'log-recv', 'raw'); return; }
    handleMessage(data);
  };

  ws.onclose = () => {
    setStatus('Disconnected', 'status-disconnected');
    logMsg('Connection closed', 'log-system');
    cleanup();
  };

  ws.onerror = (ev) => {
    logMsg('WebSocket error', 'log-error');
  };
}

function cleanup() {
  ws = null;
  if (pingTimer) { clearInterval(pingTimer); pingTimer = null; }
  $('btn-connect').textContent = 'Connect';
  $('btn-connect').classList.remove('connected');
  playerState.pid = -1;
  updatePlayerState();
}

function sendRaw(obj) {
  if (!ws || ws.readyState !== 1) { logMsg('Not connected', 'log-error'); return; }
  const json = JSON.stringify(obj);
  ws.send(json);
  if (obj.type !== 'no_timeout') {
    logMsg(json, 'log-sent', obj.type);
  }
}

function handleMessage(msg) {
  const t = msg.type || 'unknown';

  switch(t) {
    case 'login_accept':
      setStatus('Connected', 'status-connected');
      playerState.pid = msg.pid ?? -1;
      playerState.staff = msg.staffModLevel ?? 0;
      logMsg(`Login accepted! pid=${msg.pid}, staff=${msg.staffModLevel}`, 'log-info', t);
      updatePlayerState();
      break;

    case 'login_reject':
      logMsg(`Login rejected: ${msg.reason}`, 'log-error', t);
      break;

    case 'logout':
      logMsg('Server sent logout', 'log-system', t);
      break;

    case 'rebuild_normal':
      logMsg(`Zone rebuild: zoneX=${msg.zoneX} zoneZ=${msg.zoneZ} origin=(${msg.originX}, ${msg.originZ})`, 'log-info', t);
      break;

    case 'player_info':
      if (msg.players && msg.players.length > 0) {
        // find our own player entry
        const self = msg.players.find(p => p.pid === playerState.pid);
        if (self) {
          playerState.x = self.x;
          playerState.z = self.z;
          updatePlayerState();
        }
        const summary = msg.players.map(p => `pid=${p.pid}@(${p.x},${p.z})`).join(', ');
        logMsg(`${msg.players.length} player(s): ${summary}`, 'log-recv', t);
      }
      break;

    case 'npc_info':
      if (msg.npcs && msg.npcs.length > 0) {
        logMsg(`${msg.npcs.length} NPC(s) visible`, 'log-recv', t);
      }
      break;

    case 'message_game':
      logMsg(msg.message || '', 'log-info', 'game_msg');
      break;

    case 'if_set_tab':
      // suppress tab spam during login
      break;

    case 'if_close':
      break;

    case 'update_reboot_timer':
      logMsg(`Reboot in ${msg.ticks} ticks`, 'log-system', t);
      break;

    default:
      logMsg(JSON.stringify(msg), 'log-recv', t);
  }
}

function sendCmd() {
  const input = $('cmd-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // raw JSON
  if (text.startsWith('{')) {
    try {
      const obj = JSON.parse(text);
      sendRaw(obj);
    } catch(e) { logMsg('Invalid JSON: ' + e.message, 'log-error'); }
    return;
  }

  // cheat command (:: prefix)
  if (text.startsWith('::')) {
    sendRaw({ type: 'client_cheat', command: text.substring(2) });
    return;
  }

  // move x z
  if (text.startsWith('move ')) {
    const parts = text.split(/\s+/);
    if (parts.length >= 3) {
      sendRaw({ type: 'move_click', x: parseInt(parts[1]), z: parseInt(parts[2]) });
    }
    return;
  }

  // say <text>
  if (text.startsWith('say ')) {
    sendRaw({ type: 'message_public', text: text.substring(4) });
    return;
  }

  // logout
  if (text === 'logout') {
    sendRaw({ type: 'logout' });
    return;
  }

  // default: treat as cheat command
  sendRaw({ type: 'client_cheat', command: text });
}

function sendShortcut(cmd) {
  $('cmd-input').value = cmd;
  sendCmd();
}
</script>
</body>
</html>
